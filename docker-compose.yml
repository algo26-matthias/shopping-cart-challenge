services:
    php:
        image: php:8.5-fpm
        working_dir: /app
        volumes:
        - ./:/app:delegated
        depends_on:
        - db

    nginx:
        image: nginx:1.27-alpine
        ports:
        - "8080:80"
        volumes:
        - ./:/app:ro
        - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
        depends_on:
        - php

    db:
        image: mariadb:11.4
        environment:
            MARIADB_DATABASE: app
            MARIADB_USER: app
            MARIADB_PASSWORD: app
            MARIADB_ROOT_PASSWORD: root
        ports:
        - "3307:3306"
        volumes:
        - db_data:/var/lib/mysql

volumes:
    db_data:
